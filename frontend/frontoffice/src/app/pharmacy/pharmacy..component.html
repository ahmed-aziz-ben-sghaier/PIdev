<div class="pharmacy-front">

  <h2>💊 Available Medications</h2>

  <!-- Loading -->
  <p *ngIf="loading">Loading medications...</p>

  <!-- Empty -->
  <p *ngIf="!loading && medications.length === 0">
    No medications available.
  </p>

  <!-- Cards -->
  <div class="medication-list" *ngIf="!loading && medications.length > 0">
    <div class="medication-card" *ngFor="let med of medications">

      <h3>{{ med.name }}</h3>

      <p class="description">
        {{ med.description || 'No description available' }}
      </p>

      <div class="info">
        <span><strong>Price:</strong> {{ med.price }} DT</span>
        <span><strong>Stock:</strong> {{ med.quantity }}</span>
      </div>

      <p class="expiration">
        <strong>Expiration:</strong> {{ med.expirationDate | date }}
      </p>

      <button [disabled]="med.quantity === 0">
        {{ med.quantity > 0 ? 'Available' : 'Out of stock' }}
      </button>

    </div>
  </div>

</div>
