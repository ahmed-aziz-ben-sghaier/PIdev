<div class="container-fluid py-5">
  <div class="container">

    <div class="text-center mb-5">
      <h1 class="display-4">Pharmacy – Prescriptions</h1>
    </div>

    <!-- ================= FORM ================= -->
    <div class="bg-light rounded p-5 mb-5">
      <h3 class="text-primary mb-4">
        {{ editingId ? 'Edit' : 'Add' }} Prescription
      </h3>

      <form [formGroup]="form" (ngSubmit)="save()">

        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label">Prescription Date</label>
            <input type="date" class="form-control"
                   formControlName="prescriptionDate">
          </div>

          <div class="col-md-4">
            <label class="form-label">Valid Until</label>
            <input type="date" class="form-control"
                   formControlName="validUntil">
          </div>

          <div class="col-md-4">
            <label class="form-label">Status</label>
            <select class="form-select" formControlName="status">
              <option value="">Select</option>
              <option value="CREATED">CREATED</option>
              <option value="PENDING">PENDING</option>
              <option value="COMPLETED">COMPLETED</option>
            </select>
          </div>
        </div>

        <div class="row g-3 mb-3">
          <div class="col-md-6">
            <label class="form-label">Instructions</label>
            <input type="text" class="form-control"
                   formControlName="instructions">
          </div>

          <div class="col-md-3">
            <label class="form-label">User ID</label>
            <input type="text" class="form-control"
                   formControlName="userId">
          </div>

          <div class="col-md-3">
            <label class="form-label">Prescribed By</label>
            <input type="text" class="form-control"
                   formControlName="prescribedBy">
          </div>
        </div>

        <div class="row g-3 mb-4">
          <div class="col-md-6">
            <label class="form-label">Consultation ID</label>
            <input type="text" class="form-control"
                   formControlName="consultationId">
          </div>
        </div>

        <div class="d-flex gap-2">
          <button class="btn btn-primary">
            {{ editingId ? 'Update' : 'Save' }}
          </button>
          <button type="button"
                  class="btn btn-outline-secondary"
                  (click)="cancel()">
            Cancel
          </button>
        </div>

      </form>
    </div>

    <!-- ================= TABLE ================= -->
    <div class="bg-light rounded p-4">

      <div class="d-flex justify-content-between mb-3">
        <h3 class="text-primary">Prescriptions List</h3>

        <input type="text"
               class="form-control w-25"
               placeholder="Search..."
               [(ngModel)]="searchTerm"
               (input)="filterPrescriptions()"
               [ngModelOptions]="{standalone: true}">
      </div>

      <table class="table table-striped table-hover">
        <thead class="table-primary">
        <tr>
          <th>ID</th>
          <th>Date</th>
          <th>Status</th>
          <th>User</th>
          <th>Doctor</th>
          <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr *ngFor="let p of filteredPrescriptions">
          <td>{{ p.id }}</td>
          <td>{{ p.prescriptionDate }}</td>
          <td>{{ p.status }}</td>
          <td>{{ p.userId }}</td>
          <td>{{ p.prescribedBy }}</td>
          <td>
            <button class="btn btn-sm btn-warning me-1"
                    (click)="edit(p)">Edit</button>
            <button class="btn btn-sm btn-danger"
                    (click)="delete(p.id)">Delete</button>
          </td>
        </tr>

        <tr *ngIf="filteredPrescriptions.length === 0">
          <td colspan="6" class="text-center text-muted">
            No prescriptions found
          </td>
        </tr>
        </tbody>
      </table>

    </div>

  </div>
</div>
